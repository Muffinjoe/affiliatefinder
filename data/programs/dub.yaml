description: >
  Dub is the open-source link management infrastructure for modern marketing teams.
  It provides branded short links, advanced analytics (clicks, countries, devices, referrers),
  QR codes, link expiration, password protection, and a powerful API. Built for teams who
  need Bitly-level features with developer-grade control and a modern UI.

  The affiliate program pays 30% recurring for 12 months on referred paid subscriptions.
  Dub has grown rapidly among developer communities and marketing teams who want a transparent,
  open-source alternative to Bitly with proper analytics and API access.

short_description: "Open-source link management with analytics, QR codes, and branded links"

