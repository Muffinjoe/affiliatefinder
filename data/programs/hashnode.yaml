description: >
  Hashnode is a developer blogging platform and headless CMS. It allows engineers to
  publish articles on their own custom domain while also reaching Hashnode's community
  of 1M+ developers. Features include a distraction-free editor, custom domain mapping,
  newsletter integration, GitHub backup, AI writing assistant, and team publications.

  The referral program is Enterprise-only: earn a $500 flat fee for each Hashnode Headless
  CMS Enterprise license sale. This is a manual referral process — contact sales@hashnode.com
  to refer a prospect. There is no self-serve affiliate program for the free or Pro plans.

